<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Null Doxers | Profile Scanner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen font-sans selection:bg-blue-500/30">

    <!-- Background Decor (Watch Dogs Style) -->
    <div class="fixed inset-0 pointer-events-none overflow-hidden">
        <div class="absolute -top-24 -left-24 w-96 h-96 bg-blue-600/10 rounded-full blur-3xl"></div>
        <div class="absolute top-1/2 -right-24 w-64 h-64 bg-indigo-600/10 rounded-full blur-3xl"></div>
    </div>

    <main class="relative z-10 max-w-4xl mx-auto px-4 py-12">
        <!-- Header -->
        <header class="text-center mb-12">
            <h1 class="text-5xl font-black tracking-tighter uppercase italic text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-indigo-600">
                Null Doxers
            </h1>
            <p class="text-zinc-500 text-sm mt-2 tracking-widest uppercase">ctOS Profile Interface v8.1</p>
        </header>

        <!-- Search Section -->
        <section class="mb-16">
            <div class="relative group">
                <input type="text" id="searchInput"
                    placeholder="Escribe el nombre completo..."
                    class="w-full bg-zinc-900/50 border-2 border-zinc-800 p-6 rounded-2xl text-xl focus:outline-none focus:border-blue-500 transition-all placeholder:text-zinc-700 group-hover:border-zinc-700">
                <button onclick="searchDox()" class="absolute right-3 top-3 bottom-3 bg-blue-600 hover:bg-blue-500 text-white px-6 rounded-xl font-bold transition-colors flex items-center gap-2">
                    <i data-lucide="search" class="size-4"></i> SCAN
                </button>
            </div>
        </section>

        <!-- Results Grid -->
        <div id="resultsContainer" class="grid grid-cols-1 md:grid-cols-2 gap-6 hidden">
            <!-- Card Item (Template) -->
            <div class="dox-card bg-zinc-900/80 border border-zinc-800 p-6 rounded-2xl hover:border-blue-500/50 transition-all group">
                <div class="flex items-center gap-4 mb-4">
                    <div class="p-3 bg-blue-500/10 rounded-lg text-blue-400">
                        <i data-lucide="user" class="size-6"></i>
                    </div>
                    <div>
                        <h3 id="resName" class="text-xl font-bold">Nombre del Sujeto</h3>
                        <p id="resPhone" class="text-blue-400 font-mono text-sm">+00 000 000 000</p>
                    </div>
                </div>

                <div class="space-y-3 border-t border-zinc-800 pt-4">
                    <div class="flex justify-between text-sm">
                        <span class="text-zinc-500">Estado:</span>
                        <span id="resStatus" class="text-zinc-300">Online</span>
                    </div>
                    <div class="flex justify-between text-sm">
                        <span class="text-zinc-500">Ubicación:</span>
                        <span id="resLocation" class="text-zinc-300">Sector 7, Distrito Central</span>
                    </div>
                    <div class="flex justify-between text-sm">
                        <span class="text-zinc-500">Nivel de Dox:</span>
                        <span id="resLevel" class="text-zinc-300"> own.level 4</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Footer / Discord -->
        <footer class="mt-20 text-center">
            <a href="https://discord.gg/nullhunters" target="_blank"
               class="inline-flex items-center gap-3 bg-indigo-600/20 hover:bg-indigo-600/40 text-indigo-400 px-8 py-4 rounded-full border border-indigo-500/30 transition-all group">
                <i data-lucide="message-square" class="size-5 group-hover:scale-110 transition-transform"></i>
                <span class="font-medium">Join Null Hunters Discord</span>
            </a>
        </footer>
    </main>

    <script src="script.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
